<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e3a5f">
  <title>Hot Search</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F525;</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0d1b2a; color: #e0e6ed; min-height: 100vh; overflow-x: hidden; }
    header { background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%); padding: 16px 20px 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .header-title { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding: 0 20px; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { padding: 7px 14px; border-radius: 20px; font-size: 14px; font-weight: 500; white-space: nowrap; cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); border: 1px solid transparent; }
    .tab.active { background: rgba(255,255,255,0.22); color: #fff; border-color: rgba(255,255,255,0.3); }
    .refresh-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 20px; font-size: 12px; color: rgba(255,255,255,0.4); background: #0d1b2a; }
    .refresh-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); padding: 4px 12px; border-radius: 12px; font-size: 12px; cursor: pointer; }
    .refresh-btn:active { background: rgba(255,255,255,0.1); }
    .list { padding: 8px 16px 80px; }
    .item { display: flex; align-items: flex-start; gap: 12px; padding: 13px 0; border-bottom: 1px solid rgba(255,255,255,0.06); cursor: pointer; }
    .item:active { background: rgba(255,255,255,0.04); border-radius: 8px; margin: 0 -8px; padding: 13px 8px; }
    .rank { min-width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; margin-top: 1px; flex-shrink: 0; }
    .rank.top1 { background: #ff4757; color: #fff; }
    .rank.top2 { background: #ff6b35; color: #fff; }
    .rank.top3 { background: #ffa502; color: #fff; }
    .rank.other { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
    .content { flex: 1; min-width: 0; }
    .title { font-size: 15px; font-weight: 500; color: #e8edf4; line-height: 1.5; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; word-break: break-all; }
    .desc { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .source-tag { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; }
    .hot-icon { width: 14px; height: 14px; flex-shrink: 0; margin-top: 3px; }
    .loading { text-align: center; padding: 60px 0; color: rgba(255,255,255,0.4); font-size: 14px; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #2d5a87; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.4); font-size: 14px; line-height: 1.8; }
    .error-hint { font-size: 12px; color: rgba(255,255,255,0.25); margin-top: 8px; }
    .source-badge { font-size: 10px; background: rgba(45,90,135,0.5); padding: 1px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
    .fab { position: fixed; bottom: 24px; right: 24px; width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #2d5a87, #1e3a5f); color: #fff; border: none; font-size: 20px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; }
    .fab:active { transform: scale(0.95); }
    .fab-icon { font-size: 18px; }
    .hide { display: none !important; }
  </style>
</head>
<body>

<header>
  <div class="header-title"><span>&#x1F525;</span><span>Hot Search</span></div>
  <div class="tabs" id="tabs"></div>
</header>

<div class="refresh-bar">
  <span id="updateTime">--</span>
  <button class="refresh-btn" id="refreshBtn">&#x1F504; Refresh</button>
</div>

<div id="list" class="list"></div>
<div id="fab" class="fab hide"><span class="fab-icon">&#x2191;</span></div>

<script>
// ============================================================
// 今日热榜数据（来源：rebang.today，2026-04-20）
// ============================================================
var FALLBACK_DATA = {
  all: [
    {title: "70年产权的房子，实际能住多少年？", source: "知乎", hot: "18489.5", url: "https://www.zhihu.com/question/2018272205939721140"},
    {title: "为什么云南泼水节变味了？", source: "知乎", hot: "15928.1", url: "https://www.zhihu.com/question/652795560"},
    {title: "如何看待番茄平台上月稿费80万的金番作者使用AI写作...", source: "知乎", hot: "12340.3", url: "https://www.zhihu.com/question/2027490615500313080"},
    {title: "网传DeepSeek V4即将发布并提出「去CUDA化」...", source: "知乎", hot: "11324.6", url: "https://www.zhihu.com/question/2028817450829976782"},
    {title: "如何评价斥资5亿的电影《寻龙诀·觅踪》直接网播了？", source: "知乎", hot: "9188.3", url: "https://www.zhihu.com/question/2027812510628069389"},
    {title: "公司升级服务器淘汰72根DDR4内存被员工捡回：总容量约2.25TB", source: "IT之家", hot: "9171.4", url: "https://www.ithome.com/0/940/930.htm"},
    {title: "梁家辉五封影帝，马来西亚籍廖子妤打败章子怡夺影后", source: "知乎", hot: "8907.1", url: "https://www.zhihu.com/question/2029285410929480068"},
    {title: "网传社科院发布2025中国城市宜居水平排行榜", source: "知乎", hot: "8507.6", url: "https://www.zhihu.com/question/2028968003417498254"},
    {title: "WSBK荷兰站张雪机车斩获第七名，此前热身赛拿下第一", source: "知乎", hot: "7576.6", url: "https://www.zhihu.com/question/2029259993174601951"},
    {title: "内存涨价会不会倒逼软件优化，让2gb甚至512m配置重新流行？", source: "知乎", hot: "6418.3", url: "https://www.zhihu.com/question/2018673868974370892"},
    {title: "美以袭击伊朗进入第52天，当前局势如何？", source: "知乎", hot: "6306.7", url: "https://www.zhihu.com/question/2029314093757064288"},
    {title: "四大一线城市房价全线上涨，这代表楼市回暖吗？", source: "知乎", hot: "6048.4", url: "https://www.zhihu.com/question/2028419848833708708"},
    {title: "如何评价李雨桐泄露薛之谦手机号、身份证被行拘？", source: "知乎", hot: "5975.7", url: "https://www.zhihu.com/question/2029251695079682936"},
    {title: "华为Pura X Max横向阔折叠手机真机曝光，展开就像小平板", source: "IT之家", hot: "5872.1", url: "https://www.ithome.com/0/940/868.htm"},
    {title: "山西一酒店回访电话暴露行程致家庭破碎？网友热议", source: "知乎", hot: "5850.6", url: "https://www.zhihu.com/question/2029076341014770809"},
    {title: "宇树人形机器人打破人类1500米世界纪录", source: "知乎", hot: "5830.4", url: "https://www.zhihu.com/question/2029148050057077679"},
    {title: "为什么沙特会愿意让巴基斯坦驻军自己国家？", source: "知乎", hot: "5782", url: "https://www.zhihu.com/question/2028941915911984616"},
    {title: "珠海慈善总会号召为乡村孩子捐午睡桌椅，市区孩子仍趴桌午睡", source: "知乎", hot: "5152.4", url: "https://www.zhihu.com/question/2029208982745609165"},
    {title: "国产光纤全球爆单，部分产品价格暴涨650%", source: "知乎", hot: "5134.9", url: "https://www.zhihu.com/question/2029114416180851719"},
    {title: "【喷嚏图卦】我只是人", source: "喷嚏网", hot: "5012.8", url: "http://www.dapenti.com/blog/more.asp?name=xilei&id=192516"}
  ]
};

// 平台 tabs
var PLATFORMS = [
  { id: 'all',  name: '全站' }
];

var currentPlatform = 'all';
var dataCache = { all: FALLBACK_DATA.all };
var _netError = false;

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function loadRebang() {
  return new Promise(function(resolve) {
    var timeout = setTimeout(function() {
      _netError = true;
      resolve(null);
    }, 12000);

    // 通过 CORS proxy 获取 rebang.today 页面内容
    var proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://rebang.today/');
    var xhr = new XMLHttpRequest();
    xhr.open('GET', proxyUrl, true);
    xhr.onload = function() {
      clearTimeout(timeout);
      if (xhr.status === 200) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(xhr.responseText, 'text/html');
        var items = parseRebangDOM(doc);
        if (items && items.length > 0) {
          _netError = false;
          resolve(items);
          return;
        }
      }
      _netError = true;
      resolve(null);
    };
    xhr.onerror = function() {
      clearTimeout(timeout);
      _netError = true;
      resolve(null);
    };
    xhr.send();
  });
}

function parseRebangDOM(doc) {
  try {
    var items = [];
    // rebang.today 页面结构：listitem 包含 rank / title / source / hot
    var listItems = doc.querySelectorAll('main .listitem');
    listItems.forEach(function(li) {
      var rankEl = li.querySelector('.rank, [class*="rank"]');
      var linkEl = li.querySelector('a[href*="zhihu"], a[href*="weibo"], a[href*="ithome"], a[href*="douban"]');
      if (!linkEl) return;
      var title = linkEl.textContent.trim().substring(0, 80);
      // 去掉标题中的描述文字（标题后紧跟的内容）
      var rawTitle = title;
      var url = linkEl.href;
      // 来源
      var sourceEl = li.querySelector('[class*="source"], [class*="tag"]');
      var source = sourceEl ? sourceEl.textContent.trim() : '热榜';
      // 热度
      var hotEl = li.querySelector('[class*="hot"], [class*="heat"]');
      var hot = hotEl ? hotEl.textContent.trim().replace('热度', '') : '';
      if (title) {
        items.push({ title: title, source: source, hot: hot, url: url });
      }
    });
    return items;
  } catch(e) {
    return null;
  }
}

function loadAPI(platformId) {
  return loadRebang().then(function(items) {
    if (items) {
      dataCache[platformId] = items;
      return items;
    }
    return FALLBACK_DATA[platformId] || [];
  });
}

function renderTabs() {
  var tabsEl = document.getElementById('tabs');
  var html = '';
  for (var i = 0; i < PLATFORMS.length; i++) {
    var p = PLATFORMS[i];
    var cls = p.id === currentPlatform ? 'tab active' : 'tab';
    html += '<div class="' + cls + '" data-id="' + p.id + '">' + p.name + '</div>';
  }
  tabsEl.innerHTML = html;
  var tabs = tabsEl.querySelectorAll('.tab');
  for (var j = 0; j < tabs.length; j++) {
    tabs[j].addEventListener('click', function() {
      currentPlatform = this.getAttribute('data-id');
      renderTabs();
      renderList();
      scrollToTop();
    });
  }
}

function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

function showLoading() {
  document.getElementById('list').innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
}

function renderList() {
  var listEl = document.getElementById('list');
  var items = dataCache[currentPlatform];
  if (!items || items.length === 0) {
    var hint = _netError
      ? '<div class="error-hint">实时数据获取失败，显示本地缓存数据<br>数据来源：rebang.today 今日热榜</div>'
      : '<div class="error-hint">数据加载失败，请点击刷新按钮重试</div>';
    listEl.innerHTML = '<div class="error-msg">No data. Try refresh.<span class="source-badge">rebang.today</span>' + hint + '</div>';
    return;
  }
  window._netError = false;
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var rank = i + 1;
    var rankCls = rank === 1 ? 'rank top1' : rank === 2 ? 'rank top2' : rank === 3 ? 'rank top3' : 'rank other';
    var hotSvg = rank <= 3 ? '<svg class="hot-icon" viewBox="0 0 24 24" fill="none"><path d="M12 2C10.5 6 7 8 7 12c0 2.8 2.2 5 5 5s5-2.2 5-5c0-4-3.5-6-5-10z" fill="#ff4757"/></svg>' : '';
    html += '<div class="item" data-url="' + (item.url || '#') + '">' +
      '<div class="' + rankCls + '">' + rank + '</div>' +
      hotSvg +
      '<div class="content">' +
        '<div class="title">' + escHtml(item.title) + '</div>' +
        '<div class="source-tag">' + escHtml(item.source || '') + (item.hot ? ' · ' + item.hot + '热度' : '') + '</div>' +
      '</div>' +
    '</div>';
  }
  listEl.innerHTML = html;
  var itemEls = listEl.querySelectorAll('.item');
  for (var k = 0; k < itemEls.length; k++) {
    itemEls[k].addEventListener('click', function() {
      var url = this.getAttribute('data-url');
      if (url && url !== '#') window.open(url, '_blank');
    });
  }
}

async function loadAll() {
  showLoading();
  dataCache[currentPlatform] = await loadAPI(currentPlatform);
  renderList();
  var now = new Date();
  document.getElementById('updateTime').textContent =
    'Updated ' + ('0'+now.getHours()).slice(-2) + ':' + ('0'+now.getMinutes()).slice(-2);
}

document.getElementById('refreshBtn').addEventListener('click', loadAll);
document.getElementById('fab').addEventListener('click', scrollToTop);

window.addEventListener('scroll', function() {
  document.getElementById('fab').classList.toggle('hide', window.scrollY < 300);
});

renderTabs();
loadAll();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function() {});
}
</script>
</body>
</html>
