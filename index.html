<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e3a5f">
  <meta name="description" content="热搜聚合 - 一点就看">
  <title>热搜聚合</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: #0d1b2a;
      color: #e0e6ed;
      min-height: 100vh;
      overflow-x: hidden;
    }
    header {
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
      padding: 16px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7);
      border: 1px solid transparent;
    }
    .tab.active {
      background: rgba(255,255,255,0.22);
      color: #fff;
      border-color: rgba(255,255,255,0.3);
    }
    .refresh-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      background: #0d1b2a;
    }
    .refresh-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .refresh-btn:active { background: rgba(255,255,255,0.1); }
    .list { padding: 8px 16px 80px; }
    .item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 13px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      transition: background 0.15s;
    }
    .item:active { background: rgba(255,255,255,0.04); border-radius: 8px; margin: 0 -8px; padding: 13px 8px; }
    .rank {
      min-width: 22px;
      height: 22px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      margin-top: 1px;
      flex-shrink: 0;
    }
    .rank.top1 { background: #ff4757; color: #fff; }
    .rank.top2 { background: #ff6b35; color: #fff; }
    .rank.top3 { background: #ffa502; color: #fff; }
    .rank.other { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
    .content { flex: 1; min-width: 0; }
    .title {
      font-size: 15px;
      font-weight: 500;
      color: #e8edf4;
      line-height: 1.5;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .desc {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hot {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      margin-top: 3px;
    }
    .loading {
      text-align: center;
      padding: 60px 0;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #2d5a87;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg {
      text-align: center;
      padding: 40px 20px;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
    }
    .fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2d5a87, #1e3a5f);
      color: #fff;
      border: none;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fab:active { transform: scale(0.95); }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .install-banner {
      background: linear-gradient(135deg, #1e3a5f, #2d5a87);
      color: #fff;
      padding: 12px 20px;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .install-banner span { flex: 1; }
    .install-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .install-btn:active { background: rgba(255,255,255,0.3); }
    .hide { display: none !important; }
  </style>
</head>
<body>

<div id="installBanner" class="install-banner hide">
  <span>👉 戳这里安装到手机桌面，体验原生App</span>
  <button class="install-btn" onclick="installApp()">安装</button>
</div>

<header>
  <div class="header-title">
    <span>🔥</span>
    <span>热搜聚合</span>
  </div>
  <div class="tabs" id="tabs"></div>
</header>

<div class="refresh-bar">
  <span id="updateTime">--</span>
  <button class="refresh-btn" onclick="loadAll()">🔄 刷新</button>
</div>

<div id="list" class="list"></div>
<div id="fab" class="fab hide" onclick="scrollToTop()">↑</div>

<script>
const PLATFORMS = [
  { id: 'weibo',  name: '微博',   url: 'https://weibo.com',    api: 'https://api.今天的热榜.com/ranking/13?app=todayhot&country=cn&lang=zh&sys_id=3' },
  { id: 'zhihu',  name: '知乎',   url: 'https://www.zhihu.com', api: 'https://api.今天的热榜.com/ranking/5?app=todayhot&country=cn&lang=zh&sys_id=3' },
  { id: 'baidu',  name: '百度',   url: 'https://top.baidu.com', api: 'https://api.今天的热榜.com/ranking/1?app=todayhot&country=cn&lang=zh&sys_id=3' },
  { id: 'douyin', name: '抖音',   url: 'https://www.douyin.com', api: 'https://api.今天的热榜.com/ranking/8?app=todayhot&country=cn&lang=zh&sys_id=3' },
];

let currentPlatform = 'weibo';
let dataCache = {};
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.remove('hide');
});

async function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.add('hide');
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = PLATFORMS.map(p =>
    `<div class="tab${p.id === currentPlatform ? ' active' : ''}" onclick="switchTab('${p.id}')">${p.name}</div>`
  ).join('');
}

function switchTab(id) {
  currentPlatform = id;
  renderTabs();
  renderList();
  scrollToTop();
}

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showLoading() {
  document.getElementById('list').innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';
}

function renderList() {
  const listEl = document.getElementById('list');
  const items = dataCache[currentPlatform];

  if (!items || items.length === 0) {
    listEl.innerHTML = '<div class="error-msg">暂无数据，请下拉刷新</div>';
    return;
  }

  listEl.innerHTML = items.map((item, i) => {
    const rank = i + 1;
    const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : 'other';
    const hotSvg = rank <= 3
      ? `<svg class="hot" viewBox="0 0 24 24" fill="none"><path d="M12 2C10.5 6 7 8 7 12c0 2.8 2.2 5 5 5s5-2.2 5-5c0-4-3.5-6-5-10z" fill="#ff4757"/></svg>`
      : '';
    const desc = item.desc || item.category || '';
    const title = item.word || item.title || item.name || item.topic || JSON.stringify(item);

    return `
      <div class="item" onclick="window.open('${item.url || PLATFORMS.find(p=>p.id===currentPlatform).url}', '_blank')">
        <div class="rank ${rankClass}">${rank}</div>
        ${hotSvg}
        <div class="content">
          <div class="title">${title}</div>
          ${desc ? `<div class="desc">${desc}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

async function loadAPI(platform) {
  const p = PLATFORMS.find(p => p.id === platform);
  try {
    const resp = await fetch(p.api);
    const json = await resp.json();
    if (json.data) {
      return json.data.map(item => ({
        word: item.word || item.title,
        desc: item.desc || item.hot_score || '',
        url: item.url || item.link || `https://s.weibo.com/weibo?q=${encodeURIComponent(item.word || item.title)}`,
      }));
    }
    if (Array.isArray(json)) return json;
    return [];
  } catch (e) {
    console.warn(platform, 'load failed', e);
    return [];
  }
}

async function loadAll() {
  showLoading();
  for (const p of PLATFORMS) {
    dataCache[p.id] = await loadAPI(p.id);
  }
  renderList();
  document.getElementById('updateTime').textContent = `更新于 ${new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'})}`;
}

window.addEventListener('scroll', () => {
  document.getElementById('fab').classList.toggle('hide', window.scrollY < 300);
});

renderTabs();
loadAll();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
