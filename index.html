<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e3a5f">
  <title>Hot Search</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F525;</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0d1b2a; color: #e0e6ed; min-height: 100vh; overflow-x: hidden; }
    header { background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%); padding: 16px 20px 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .header-title { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding: 0 20px; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { padding: 7px 14px; border-radius: 20px; font-size: 14px; font-weight: 500; white-space: nowrap; cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); border: 1px solid transparent; }
    .tab.active { background: rgba(255,255,255,0.22); color: #fff; border-color: rgba(255,255,255,0.3); }
    .refresh-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 20px; font-size: 12px; color: rgba(255,255,255,0.4); background: #0d1b2a; }
    .refresh-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); padding: 4px 12px; border-radius: 12px; font-size: 12px; cursor: pointer; }
    .refresh-btn:active { background: rgba(255,255,255,0.1); }
    .list { padding: 8px 16px 80px; }
    .item { display: flex; align-items: flex-start; gap: 12px; padding: 13px 0; border-bottom: 1px solid rgba(255,255,255,0.06); cursor: pointer; }
    .item:active { background: rgba(255,255,255,0.04); border-radius: 8px; margin: 0 -8px; padding: 13px 8px; }
    .rank { min-width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; margin-top: 1px; flex-shrink: 0; }
    .rank.top1 { background: #ff4757; color: #fff; }
    .rank.top2 { background: #ff6b35; color: #fff; }
    .rank.top3 { background: #ffa502; color: #fff; }
    .rank.other { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
    .content { flex: 1; min-width: 0; }
    .title { font-size: 15px; font-weight: 500; color: #e8edf4; line-height: 1.5; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; word-break: break-all; }
    .desc { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hot-icon { width: 14px; height: 14px; flex-shrink: 0; margin-top: 3px; }
    .loading { text-align: center; padding: 60px 0; color: rgba(255,255,255,0.4); font-size: 14px; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #2d5a87; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.4); font-size: 14px; line-height: 1.8; }
    .error-hint { font-size: 12px; color: rgba(255,255,255,0.25); margin-top: 8px; }
    .source-tag { font-size: 10px; background: rgba(45,90,135,0.5); padding: 1px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
    .fab { position: fixed; bottom: 24px; right: 24px; width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #2d5a87, #1e3a5f); color: #fff; border: none; font-size: 20px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; }
    .fab:active { transform: scale(0.95); }
    .fab-icon { font-size: 18px; }
    .hide { display: none !important; }
  </style>

<body>

    {title: "习近平全民阅读", desc: "全国首个全民阅读活动周启幕", url: "https://so.toutiao.com/search?keyword=习近平全民阅读"}

    {title: "四川资中4.5级地震", desc: "四川内江市资中县发生4.5级地震", url: "https://www.thepaper.cn/search.jsp?qs=四川资中地震"}
  ]

// 平台配置（使用 newsnow.busiyi.world API，数据来源：TrendRadar）
var PLATFORMS = [
  { id: 'baidu',  name: '百度' },
  { id: 'weibo',  name: '微博' },
  { id: 'toutiao', name: '头条' },
  { id: 'zhihu',  name: '知乎' },
  { id: 'douyin', name: '抖音' },
  { id: 'bilibili', name: 'B站' },
  { id: 'thepaper', name: '澎湃' }
];

// newsnow API 数据格式转换
function parseNewsNow(data, platformId) {
  if (!data || !data.items || !Array.isArray(data.items)) return null;
  return data.items.map(function(item) {
    var title = item.title || '';
    var desc = (item.extra && item.extra.hover) ? item.extra.hover : '';
    var url = item.url || item.mobileUrl || '';
    return { title: title, desc: desc.slice(0, 80), url: url };
  }).filter(function(item) { return item.title; });
}

var currentPlatform = 'baidu';
var dataCache = {};
var _scriptCounter = 0;
var _netError = false;

function loadAPI(platformId) {
  return new Promise(function(resolve) {
    var p = PLATFORMS.find(function(x) { return x.id === platformId; });
    if (!p) { resolve([]); return; }

    // 使用 newsnow API（TrendRadar 引擎）
    var apiUrl = 'https://newsnow.busiyi.world/api/s?id=' + platformId + '&latest';

    var script = document.createElement('script');
    var resolved = false;
    var timeout = setTimeout(function() {
      if (!resolved) {
        resolved = true;
        cleanup();
        _netError = true;
        resolve(FALLBACK_DATA[platformId] || []);
      }
    }, 10000);

    function cleanup() {
      clearTimeout(timeout);
      script.onload = null;
      script.onerror = null;
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    // newsnow API 返回 {status, id, updatedTime, items: [{title, url, extra: {hover}}]}
    window._newsNowCallback = function(data) {
      if (resolved) return;
      resolved = true;
      cleanup();
      if (data && data.status === 'success') {
        var items = parseNewsNow(data, platformId);
        if (items && items.length > 0) {
          _netError = false;
          resolve(items);
          return;
        }
      }
      _netError = true;
      resolve(FALLBACK_DATA[platformId] || []);
    };

    script.onerror = function() {
      if (resolved) return;
      resolved = true;
      cleanup();
      _netError = true;
      resolve(FALLBACK_DATA[platformId] || []);
    };

    script.src = apiUrl + '&callback=_newsNowCallback&t=' + (++_scriptCounter) + '_' + Date.now();
    document.head.appendChild(script);
  });
}

function renderTabs() {
  var tabsEl = document.getElementById('tabs');
  var html = '';
  for (var i = 0; i < PLATFORMS.length; i++) {
    var p = PLATFORMS[i];
    var cls = p.id === currentPlatform ? 'tab active' : 'tab';
    html += '<div class="' + cls + '" data-id="' + p.id + '">' + p.name + '</div>';
  }
  tabsEl.innerHTML = html;
  var tabs = tabsEl.querySelectorAll('.tab');
  for (var j = 0; j < tabs.length; j++) {
    tabs[j].addEventListener('click', function() {
      currentPlatform = this.getAttribute('data-id');
      renderTabs();
      renderList();
      scrollToTop();
    });
  }
}

function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

function showLoading() {
  document.getElementById('list').innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderList() {
  var listEl = document.getElementById('list');
  var items = dataCache[currentPlatform];
  if (!items || items.length === 0) {
    var platform = PLATFORMS.find(function(p) { return p.id === currentPlatform; });
    var sourceHint = platform ? '<span class="source-tag">newsnow API</span>' : '';
    var hint = _netError
      ? '<div class="error-hint">实时数据获取失败，显示本地缓存数据<br>数据来源：TrendRadar / newsnow</div>'
      : '<div class="error-hint">数据加载失败，请点击刷新按钮重试</div>';
    listEl.innerHTML = '<div class="error-msg">No data. Try refresh.' + sourceHint + hint + '</div>';
    return;
  }
  window._netError = false;
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var rank = i + 1;
    var rankCls = rank === 1 ? 'rank top1' : rank === 2 ? 'rank top2' : rank === 3 ? 'rank top3' : 'rank other';
    var hotSvg = rank <= 3 ? '<svg class="hot-icon" viewBox="0 0 24 24" fill="none"><path d="M12 2C10.5 6 7 8 7 12c0 2.8 2.2 5 5 5s5-2.2 5-5c0-4-3.5-6-5-10z" fill="#ff4757"/></svg>' : '';
    var link = item.url || '#';
    html += '<div class="item" data-url="' + link + '">' +
      '<div class="' + rankCls + '">' + rank + '</div>' +
      hotSvg +
      '<div class="content">' +
        '<div class="title">' + escHtml(item.title) + '</div>' +
        (item.desc ? '<div class="desc">' + escHtml(item.desc) + '</div>' : '') +
      '</div>' +
    '</div>';
  }
  listEl.innerHTML = html;
  var itemEls = listEl.querySelectorAll('.item');
  for (var k = 0; k < itemEls.length; k++) {
    itemEls[k].addEventListener('click', function() {
      var url = this.getAttribute('data-url');
      if (url && url !== '#') window.open(url, '_blank');
    });
  }
}

async function loadAll() {
  showLoading();
  var promises = PLATFORMS.map(function(p) { return loadAPI(p.id); });
  var results = await Promise.all(promises);
  for (var i = 0; i < PLATFORMS.length; i++) {
    dataCache[PLATFORMS[i].id] = results[i] || [];
  }
  renderList();
  var now = new Date();
  document.getElementById('updateTime').textContent =
    'Updated ' + ('0'+now.getHours()).slice(-2) + ':' + ('0'+now.getMinutes()).slice(-2);
}

document.getElementById('refreshBtn').addEventListener('click', loadAll);
document.getElementById('fab').addEventListener('click', scrollToTop);

window.addEventListener('scroll', function() {
  document.getElementById('fab').classList.toggle('hide', window.scrollY < 300);
});

renderTabs();
loadAll();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function() {});
}
</script>
</body>
